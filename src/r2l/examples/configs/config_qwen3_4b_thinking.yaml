data:
  train_files: chuhac/R2D-R1@train
  val_files: NWULIST/R2D-R1-test@test
  prompt_key: input
  answer_key: output
  image_key: images
  video_key: videos
  image_dir: null
  video_fps: 2.0
  max_prompt_length: 1024
  max_response_length: 2048
  rollout_batch_size: 64
  mini_rollout_batch_size: null  # equivalent to verl's data.gen_batch_size
  val_batch_size: 32
  format_prompt: ./examples/format_prompt/r1v.jinja
  override_chat_template: null
  shuffle: true
  seed: 238
  min_pixels: 262144
  max_pixels: 4194304
  filter_overlong_prompts: true

algorithm:
  adv_estimator: grpo
  disable_kl: false
  use_kl_loss: true
  kl_penalty: low_var_kl
  kl_coef: 1.0e-2
  online_filtering: false  # dapo filter groups
  filter_key: overall
  filter_low: 0.01
  filter_high: 0.99

worker:
  actor:
    global_batch_size: 32
    micro_batch_size_per_device_for_update: 2
    micro_batch_size_per_device_for_experience: 2  # smaller micro-batch for more stable training
    max_grad_norm: 1.0
    padding_free: false
    dynamic_batching: false  # disable dynamic batching to avoid distributed-sync issues
    ulysses_size: 1
    model:
      model_path: Qwen/Qwen3-4B-Thinking-2507
      enable_gradient_checkpointing: true
      trust_remote_code: false
      freeze_vision_tower: false
    optim:
      lr: 1.0e-6
      weight_decay: 1.0e-2
      strategy: adamw  # {adamw, adamw_bf16}
      lr_warmup_ratio: 0.0
    fsdp:
      enable_full_shard: true
      enable_cpu_offload: false
      enable_rank0_init: true
    offload:
      offload_params: false
      offload_optimizer: true  # keep optimizer on CPU to avoid OOM during load_checkpoint

  rollout:
    n: 8
    temperature: 0.6
    top_p: 0.95
    limit_images: 0
    gpu_memory_utilization: 0.35  # lowered to leave headroom for checkpoint gather
    enforce_eager: true
    enable_chunked_prefill: false
    tensor_parallel_size: 4
    disable_tqdm: false
    val_override_config:
      temperature: 0.6
      top_p: 0.95
      n: 1

  ref:
    fsdp:
      enable_full_shard: true
      enable_cpu_offload: false  # not needed with 4 GPUs
      enable_rank0_init: true
    offload:
      offload_params: false  # not needed with 4 GPUs

  reward:
    reward_type: batch
    reward_function: ./examples/reward_function/reasoning_trace.py:compute_score
    projection_ckpt_path: ./outputs/lclr/projection_head.pt
    safety_ckpt_path: ./outputs/lclr/safety_head.pt
    projection_dim: 512
    model_path: Qwen/Qwen3-4B-Thinking-2507
    num_gpus: 0  # reward is CPU-only (latent computed in actor)
    

trainer:
  total_epochs: 3  # reduced epochs (was 15); GRPO typically needs only 3-5 epochs
  max_steps: null
  project_name: easy_r1
  experiment_name: qwen3_4b_think_safety_2  # updated to distinguish experiment names
  logger: ["file", "wandb"]
  nnodes: 1
  n_gpus_per_node: 4
  max_try_make_batch: 20  # -1 means no limit
  val_freq: -1  # disable validation
  val_before_train: false
  val_only: false
  val_generations_to_log: 3
  save_freq: 1  # -1 to disable
  save_limit: 3  # -1 to disable
  save_model_only: true  # optimizer save (~32 GB CPU RAM spike) causes OOM; model-only is ~8 GB total
  save_checkpoint_path: ./checkpoints/qwen3_4b_thinking_craft
  load_checkpoint_path: null
  find_last_checkpoint: true

