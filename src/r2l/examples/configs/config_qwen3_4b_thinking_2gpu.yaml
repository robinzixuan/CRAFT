data:
  train_files: chuhac/R2D-R1
  val_files: chuhac/R2D-R1
  prompt_key: input
  answer_key: output
  image_key: images
  video_key: videos
  image_dir: null
  video_fps: 2.0
  max_prompt_length: 1024
  max_response_length: 2048
  rollout_batch_size: 8  # 降低 batch size，减少显存压力
  mini_rollout_batch_size: null  # equivalent to verl's data.gen_batch_size
  val_batch_size: 16
  format_prompt: ./examples/format_prompt/r1v.jinja
  override_chat_template: null
  shuffle: true
  seed: 238
  min_pixels: 262144
  max_pixels: 4194304
  filter_overlong_prompts: true

algorithm:
  adv_estimator: grpo
  disable_kl: false
  use_kl_loss: true
  kl_penalty: low_var_kl
  kl_coef: 1.0e-2
  online_filtering: false  # dapo filter groups
  filter_key: overall
  filter_low: 0.01
  filter_high: 0.99

worker:
  actor:
    global_batch_size: 4  # 配合 rollout_batch_size=8
    micro_batch_size_per_device_for_update: 1  # 2 GPU 显存更紧，降到 1
    micro_batch_size_per_device_for_experience: 2
    max_grad_norm: 1.0
    padding_free: false
    dynamic_batching: false  # 关闭动态批处理，避免分布式同步问题
    ulysses_size: 1
    model:
      model_path: Qwen/Qwen3-4B-Thinking-2507
      enable_gradient_checkpointing: true
      trust_remote_code: false
      freeze_vision_tower: false
    optim:
      lr: 1.0e-6
      weight_decay: 1.0e-2
      strategy: adamw  # {adamw, adamw_bf16}
      lr_warmup_ratio: 0.0
    fsdp:
      enable_full_shard: true
      enable_cpu_offload: false
      enable_rank0_init: true
    offload:
      offload_params: true
      offload_optimizer: true  # 2 GPU 显存紧张，offload 优化器到 CPU

  rollout:
    n: 3
    temperature: 0.6
    top_p: 0.95
    limit_images: 0
    gpu_memory_utilization: 0.2  # 进一步降低，为 checkpoint 保存留空间
    enforce_eager: true
    enable_chunked_prefill: false
    tensor_parallel_size: 1
    disable_tqdm: false
    val_override_config:
      temperature: 0.6
      top_p: 0.95
      n: 1

  ref:
    fsdp:
      enable_full_shard: true
      enable_cpu_offload: false
      enable_rank0_init: true
    offload:
      offload_params: true  # 2 GPU 显存紧张，ref 模型 offload 到 CPU

  reward:
    reward_type: batch
    reward_function: ./examples/reward_function/reasoning_trace.py:compute_score
    projection_ckpt_path: ./outputs/lclr/projection_head.pt
    safety_ckpt_path: ./outputs/lclr/safety_head.pt
    projection_dim: 512
    model_path: Qwen/Qwen3-4B-Thinking-2507
    num_gpus: 1  # 只需要 1 个 GPU 用于 reward 计算
    

trainer:
  total_epochs: 8  # 减少 epochs（原 15），GRPO 通常 3-5 epoch 足够
  max_steps: null
  project_name: easy_r1
  experiment_name: qwen3_4b_think_safety_2_2gpu
  logger: ["file", "wandb"]
  nnodes: 1
  n_gpus_per_node: 2
  max_try_make_batch: 20  # -1 means no limit
  val_freq: -1  # 禁用验证
  val_before_train: false
  val_only: false
  val_generations_to_log: 3
  save_freq: 1  # -1 to disable
  save_limit: 3  # -1 to disable
  save_model_only: false
  save_checkpoint_path: ./checkpoints/qwen3_4b_thinking_craft_2gpu
  load_checkpoint_path: null
  find_last_checkpoint: true

